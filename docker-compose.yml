services:
  postgres:
    image: postgres:16-alpine
    container_name: connecteed-postgres
    environment:
      POSTGRES_USER: connecteed
      POSTGRES_PASSWORD: connecteed_secret
      POSTGRES_DB: crm_connecteed
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U connecteed -d crm_connecteed"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: connecteed-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: connecteed-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: connecteed
      DB_PASSWORD: connecteed_secret
      DB_DATABASE: crm_connecteed
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-jwt-secret-key-change-in-production-2026
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: dev-refresh-secret-key-change-in-production-2026
      JWT_REFRESH_EXPIRES_IN: 7d
      APP_PORT: 3000
      APP_ENV: development
      FRONTEND_URL: http://localhost:5175
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: 50
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/scripts:/app/scripts
      - ./backend/nest-cli.json:/app/nest-cli.json
      - ./backend/tsconfig.json:/app/tsconfig.json
      - ./uploads:/app/uploads
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: connecteed-frontend
    environment:
      VITE_PROXY_TARGET: http://backend:3000
    ports:
      - "5175:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  backend_node_modules:
  frontend_node_modules:
